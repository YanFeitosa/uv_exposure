name: uv_exposure_app
description: "SunSense - UV Exposure Monitoring App"
publish_to: 'none'

version: 3.1.0+3

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.3

  # File system paths
  path_provider: ^2.1.5

  # Audio
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Charts
  fl_chart: ^0.69.2

  # UI
  cupertino_icons: ^1.0.8

  # Foreground service / background task
  flutter_foreground_task: ^9.2.1

  # Compartilhamento de arquivos (bottom sheet nativo do sistema)
  share_plus: ^10.1.2

dependency_overrides:
  path_provider_android: ^2.2.22

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  mocktail: ^1.0.4

  fake_async: ^1.3.2

  path_provider_platform_interface: ^2.1.2

  plugin_platform_interface: ^2.1.8

  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_round: "assets/images/logo_rounded.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/image.png
    - assets/audio/alarm.mp3